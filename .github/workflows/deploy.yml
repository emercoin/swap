name: ci-deploy

# Mirrors the edge/adapter pipeline of this stack: test -> build -> push to GHCR.
# The droplet's Watchtower (label-scoped, --interval 600) pulls the new image and
# recreates the `swap` container on its own — no inbound SSH / deploy channel.
#
# After the push we also *nudge* Watchtower via its token-gated HTTP API so the
# deploy lands in seconds instead of waiting out the ~10-min poll. It stays
# pull-based (no inbound SSH): Watchtower itself does the pull. The nudge is
# optional — if the WATCHTOWER_URL secret isn't set the step no-ops and the poll
# still deploys. Droplet-side setup (in the emer-ai-tools stack + Caddy): see
# DESIGN §9 ("faster deploy").
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: uv run --extra dev pytest -q

  build-push:
    # Only publish from main; PRs stop at the test gate above.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io/<owner>/swap via GITHUB_TOKEN
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/swap
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Ask the droplet's Watchtower to pull + recreate now (token-gated HTTP API)
      # instead of waiting for its poll. No-ops when WATCHTOWER_URL isn't configured,
      # and never fails the pipeline (the poll is the fallback). Worst case for the
      # token holder is forcing a re-pull of an already-published image — no arbitrary
      # image, so this is a low-risk, public-but-token-gated endpoint behind Cloudflare.
      - name: Nudge Watchtower to deploy now
        env:
          WATCHTOWER_URL: ${{ secrets.WATCHTOWER_URL }}
          WATCHTOWER_TOKEN: ${{ secrets.WATCHTOWER_TOKEN }}
        run: |
          if [ -z "$WATCHTOWER_URL" ]; then
            echo "WATCHTOWER_URL secret not set — skipping push trigger; Watchtower will poll."
            exit 0
          fi
          code=$(curl -sS --max-time 30 -o /dev/stderr -w '%{http_code}' \
            -H "Authorization: Bearer $WATCHTOWER_TOKEN" "$WATCHTOWER_URL") || true
          echo "Watchtower update -> HTTP $code"
          case "$code" in 200|204) echo "deploy nudged";; *) echo "::warning::Watchtower nudge failed (HTTP $code); poll will still deploy";; esac
