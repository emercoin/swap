name: ci-deploy

# Mirrors the edge/adapter pipeline of the emercoin_docker stack:
#   test -> build -> push to GHCR -> SSH into the droplet and roll the container.
# After pushing ghcr.io/<owner>/swap:latest, CI runs deploy/deploy-service.sh on the
# box (git pull + `compose pull swap` + `up -d swap`). No Watchtower, no registry
# polling, no inbound HTTP deploy endpoint — the pull happens once per release.
# The SSH step self-skips (not fails) when DEPLOY_HOST isn't configured, so the
# image still publishes. Droplet-side setup (deploy key + secrets): see DESIGN §9.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: uv run --extra dev pytest -q

  build-push:
    # Only publish from main; PRs stop at the test gate above.
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write          # push to ghcr.io/<owner>/swap via GITHUB_TOKEN
    # Surfaced into the env context so the deploy step can self-skip when the SSH
    # secrets aren't configured (the `secrets` context isn't usable in `if:`).
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/swap
          tags: |
            type=raw,value=latest
            type=sha,format=long
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Roll the new image on the droplet immediately: SSH in and run the rollout
      # script (git pull + `compose pull swap` + `up -d swap`). Skipped (not failed)
      # when DEPLOY_HOST is unset, so the image still publishes. The CI key is pinned
      # to deploy-service.sh in the droplet's authorized_keys (see DESIGN §9).
      - name: Deploy swap on the droplet
        if: env.DEPLOY_HOST != ''
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: bash /opt/swap/deploy/deploy-service.sh
